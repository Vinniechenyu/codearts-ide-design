<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeArts IDE Design · 材料启动台</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23141414'/%3E%3Crect x='14' y='14' width='12' height='12' fill='%23B7A2F2'/%3E%3Crect x='26' y='26' width='12' height='12' fill='%23F3D24E'/%3E%3Crect x='38' y='38' width='12' height='12' fill='%23141414'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F4EE;--card:#FFFFFF;--ink:#141414;--ink2:#4B4B47;--ink3:#8A897F;
    --line:#141414;--rule:#DAD7CD;
    --pixel:"Press Start 2P",ui-monospace,monospace;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --sans:"PingFang SC","HarmonyOS Sans SC","Microsoft YaHei",-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.62;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(var(--rule) 1px,transparent 1px);background-size:22px 22px;background-attachment:fixed}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer}
  .wrap{max-width:1200px;margin:0 auto;padding:34px 30px 80px}

  .top{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--line);padding-bottom:16px}
  .logo{font-family:var(--pixel);font-size:15px;letter-spacing:.02em}
  .logo .dot{color:#7C5CFC}
  .top .meta{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase}

  .hero{padding:46px 0 26px}
  .kick{font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.16em;color:var(--ink3);text-transform:uppercase;margin-bottom:20px}
  .htitle{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .htitle h1{margin:0;font-family:var(--pixel);font-size:clamp(30px,6vw,58px);line-height:1.06;letter-spacing:.01em}
  .htitle .cnt{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ink3)}
  .sticker{font-family:var(--sans);font-weight:800;font-size:15px;background:#F3D024;color:#141414;
    padding:7px 14px;border:2px solid var(--line);box-shadow:3px 3px 0 var(--line);transform:rotate(-3.5deg)}
  .zh{margin:22px 0 0;font-size:23px;font-weight:800;letter-spacing:-.01em}
  .lead{margin:12px 0 0;color:var(--ink2);font-size:15px;max-width:46em}

  /* two-column layout: sidebar + main */
  .layout{display:grid;grid-template-columns:236px 1fr;gap:34px;align-items:start;margin-top:26px}
  @media(max-width:860px){.layout{grid-template-columns:1fr}}

  .side{position:sticky;top:22px}
  @media(max-width:860px){.side{position:static}}
  .box{border:2px solid var(--line);background:var(--card);box-shadow:4px 4px 0 var(--line)}
  .box h3{margin:0;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink3);padding:13px 14px;border-bottom:2px solid var(--line)}
  .navlist{display:flex;flex-direction:column}
  .navitem{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    padding:12px 14px;border:0;border-bottom:1px solid var(--rule);background:transparent;text-align:left;
    font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink);transition:background .1s,color .1s}
  .navitem:last-child{border-bottom:0}
  .navitem:hover{background:var(--paper)}
  .navitem.on{background:var(--ink);color:#fff}
  .navitem .n{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink3);flex:none}
  .navitem.on .n{color:rgba(255,255,255,.72)}
  .navitem.zero{color:var(--ink3)}
  .navitem.zero .lab::after{content:" · 待更新";font-size:11px;color:var(--ink3)}
  .side .hint{font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--ink3);padding:12px 4px 0}

  .search{position:relative;margin-bottom:22px}
  .search input{width:100%;padding:12px 14px 12px 40px;border:2px solid var(--line);background:var(--card);color:var(--ink);
    font-family:var(--mono);font-size:13px;outline:none;box-shadow:3px 3px 0 var(--line);transition:box-shadow .1s,transform .1s}
  .search input:focus{box-shadow:4px 4px 0 #7C5CFC;transform:translate(-1px,-1px)}
  .search input::placeholder{color:var(--ink3)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--ink);fill:none;stroke-width:2.2}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:34px 28px}
  .card{display:flex;flex-direction:column;transition:transform .12s ease}
  .card:hover{transform:translateY(-3px)}
  .frame{border:2px solid var(--line);background:var(--card);box-shadow:5px 5px 0 var(--line);transition:box-shadow .12s}
  .card:hover .frame{box-shadow:8px 8px 0 var(--ac)}
  .term{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:2px solid var(--line);
    font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--ink)}
  .term .go{color:var(--ink3)}
  .card:hover .term .go{color:#7C5CFC}
  .shot{position:relative;aspect-ratio:16/9;overflow:hidden;background:repeating-linear-gradient(45deg,#EEEBE3,#EEEBE3 8px,#E7E3DA 8px,#E7E3DA 16px)}
  .shot img{width:100%;height:100%;object-fit:cover;object-position:center top}
  .cat-lab{position:absolute;top:10px;left:10px;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.06em;
    background:var(--card);color:var(--ink);border:2px solid var(--line);padding:4px 9px}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-top:2px solid var(--line);
    background:var(--ac);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;color:#141414}
  .bar .st{display:inline-flex;align-items:center;gap:6px}
  .bar .st::before{content:"";width:7px;height:7px;background:#141414}

  .card h2{margin:18px 0 0;font-size:18px;font-weight:800;letter-spacing:-.01em;line-height:1.35}
  .card .sub{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--ink3);margin-top:5px;letter-spacing:.02em}
  .card p{margin:10px 0 0;color:var(--ink2);font-size:13.5px}
  .role{margin-top:14px;font-family:var(--mono);font-size:11.5px;color:var(--ink2)}
  .role b{color:var(--ink3);font-weight:700;letter-spacing:.08em}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
  .tag{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--tk);background:var(--tbg);
    border:1.5px solid var(--tbd);border-radius:999px;padding:5px 10px}

  .empty{display:none;text-align:center;padding:64px 20px;color:var(--ink3);grid-column:1/-1;
    border:2px dashed var(--rule);background:rgba(255,255,255,.5)}
  .empty.show{display:block}
  .empty h3{margin:0 0 6px;color:var(--ink2);font-size:15px;font-family:var(--mono);letter-spacing:.06em}
  .clear{margin-top:16px;padding:9px 16px;border:2px solid var(--line);background:var(--card);color:var(--ink);
    font-family:var(--mono);font-size:12px;font-weight:700;box-shadow:3px 3px 0 var(--line)}

  footer{margin-top:64px;padding-top:20px;border-top:2px solid var(--line);color:var(--ink3);
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">CODEARTS<span class="dot">.</span>DESIGN</div>
    <div class="meta">UCD CENTER · 2026</div>
  </div>

  <header class="hero">
    <div class="kick">CodeArts IDE Design · 设计材料</div>
    <div class="htitle">
      <h1>MATERIALS</h1>
      <span class="cnt" id="hcnt"></span>
      <span class="sticker">启动台 ·</span>
    </div>
    <div class="zh">设计材料启动台</div>
    <p class="lead">CodeArts IDE / 码道代码智能体相关的体验设计材料统一托管——专项分析、概念探索、交互原型、竞品分析与文档。左侧目录按类型浏览,新材料持续更新。</p>
  </header>

  <div class="layout">
    <aside class="side">
      <div class="box">
        <h3>目录 · CATALOG</h3>
        <div class="navlist" id="nav"></div>
      </div>
      <div class="hint">□ 新分类 / 材料持续扩展<br>□ 点击分类可筛选</div>
    </aside>

    <main>
      <div class="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="搜索材料 / 标签 / 关键词…" autocomplete="off">
      </div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty">
        <h3 id="emptyTitle">NO MATCH</h3>
        <div id="emptyDesc">换个关键词,或清空筛选试试。</div>
        <button class="clear" id="clear">查看全部</button>
      </div>
    </main>
  </div>

  <footer>
    <span>© 2026 UCD CENTER · 内容仅用于设计交流</span>
    <span id="count"></span>
  </footer>
</div>

<script>
const STATUS = { live:"可体验", proto:"原型", concept:"概念探索", doc:"文档" };
const ACCENTS = {
  purple: { bar:"#B7A2F2", tbg:"#EFEAFD", tbd:"#D3C6F7", tk:"#5A32C6" },
  amber:  { bar:"#F3D24E", tbg:"#FBF2D3", tbd:"#EBD99C", tk:"#7A5600" },
  green:  { bar:"#8FD98A", tbg:"#E4F5E1", tbd:"#B9E5B2", tk:"#1E7A34" },
  teal:   { bar:"#8FE0D6", tbg:"#DFF6F2", tbd:"#B5E7DF", tk:"#0E7367" },
  pink:   { bar:"#F4A9C8", tbg:"#FCE3EE", tbd:"#F2BFD5", tk:"#A93468" }
};

// ★ 分类目录:未来加类型 → 在这里加一行(id 唯一,label 显示名),空分类也会占位
const CATEGORIES = [
  { id:"all",  label:"全部材料" },
  { id:"专项", label:"系统化专项分析" },
  { id:"概念", label:"概念方案探索" },
  { id:"原型", label:"产品交互原型" },
  { id:"竞品", label:"竞品分析" },
  { id:"文档", label:"设计文档 / 规范" }
];

// ★ 添加新材料:复制一个对象,cat 填上面的分类 id,填 标题/desc/preview/tags/href
const ITEMS = [
  {
    title: "码道 · 生成响应体验优化专项",
    sub: "CodeArts Agent · Response Experience",
    cat: "专项",
    status: "live",
    type: "系统化专项分析 · 40 页",
    desc: "把“感觉慢”拆成可证明的证据链:五产品同题实测、码道输出结构拆解、根因机制(执行编排×信息呈现×环境)与设计方案——五阶段主干 + 异常旁路 + 状态动效原则。",
    preview: "assets/preview-madao-response-deck.png",
    tags: ["评测", "响应体验", "40 页", "GLM-5.1 对照"],
    href: "madao-response-deck/",
    meta: "40 页",
    accent: "purple"
  },
  {
    title: "CodeArts ADE · 拆透 ADE,重构工作流",
    sub: "AI-Native Workflow · Design Vision",
    cat: "概念",
    status: "concept",
    type: "概念方案探索 · 长文页",
    desc: "从产品拆解到设计主张:AI 时代开发工作流里什么该变、什么该留——把“验收”做成新流程的心脏。含 ADE 速写、演进坐标、竞品横比、能力矩阵、设计洞察与落地路线。",
    preview: "assets/preview-codearts-ade-vision.png",
    tags: ["ADE 拆解", "设计主张", "工作流重构", "验收中心"],
    href: "codearts-ade-vision/",
    meta: "8 节",
    accent: "green"
  }
];

const catLabel = id => (CATEGORIES.find(c => c.id === id) || {}).label || id;
const navEl = document.getElementById('nav');
const grid = document.getElementById('grid');
const qEl = document.getElementById('q');
const emptyEl = document.getElementById('empty');
const emptyTitle = document.getElementById('emptyTitle');
const emptyDesc = document.getElementById('emptyDesc');
const countEl = document.getElementById('count');
document.getElementById('hcnt').textContent = '(' + String(ITEMS.length).padStart(2,'0') + ')';
const state = { cat:'all', q:'' };

// build sidebar nav
CATEGORIES.forEach(c => {
  const n = c.id === 'all' ? ITEMS.length : ITEMS.filter(i => i.cat === c.id).length;
  const b = document.createElement('button');
  b.className = 'navitem' + (c.id === 'all' ? ' on' : '') + (n === 0 ? ' zero' : '');
  b.innerHTML = `<span class="lab">${c.label}</span><span class="n">${String(n).padStart(2,'0')}</span>`;
  b.onclick = () => { state.cat = c.id; [...navEl.children].forEach(x => x.classList.toggle('on', x === b)); render(); };
  navEl.appendChild(b);
});

function match(it){
  if (state.cat !== 'all' && it.cat !== state.cat) return false;
  const q = state.q.trim().toLowerCase();
  if (!q) return true;
  return (it.title+' '+(it.sub||'')+' '+it.desc+' '+(it.tags||[]).join(' ')+' '+catLabel(it.cat)).toLowerCase().includes(q);
}

function render(){
  const list = ITEMS.filter(match);
  grid.innerHTML = list.map((it) => {
    const idx = ITEMS.indexOf(it);
    const ac = ACCENTS[it.accent] || ACCENTS.purple;
    const code = 'MATERIAL_' + String(idx+1).padStart(2,'0');
    const st = STATUS[it.status] || it.status;
    const metaR = it.meta || ((it.tags||[]).length + ' TAGS');
    const tags = (it.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const thumb = it.preview ? `<img src="${it.preview}" alt="${it.title}" loading="lazy">` : '';
    return `<a class="card" href="${it.href}" style="--ac:${ac.bar};--tbg:${ac.tbg};--tbd:${ac.tbd};--tk:${ac.tk}">
      <div class="frame">
        <div class="term"><span>${code}</span><span class="go">OPEN ↗</span></div>
        <div class="shot"><span class="cat-lab">${catLabel(it.cat)}</span>${thumb}</div>
        <div class="bar"><span class="st">${st}</span><span>${metaR}</span></div>
      </div>
      <h2>${it.title}</h2>
      ${it.sub ? `<div class="sub">${it.sub}</div>` : ''}
      <p>${it.desc}</p>
      ${it.type ? `<div class="role"><b>TYPE</b> / ${it.type}</div>` : ''}
      <div class="tags">${tags}</div>
    </a>`;
  }).join('');
  const zeroCat = state.cat !== 'all' && ITEMS.filter(i => i.cat === state.cat).length === 0;
  if (zeroCat){ emptyTitle.textContent = 'COMING SOON'; emptyDesc.textContent = '「' + catLabel(state.cat) + '」分类的材料即将上线,敬请期待。'; }
  else { emptyTitle.textContent = 'NO MATCH'; emptyDesc.textContent = '换个关键词,或查看全部材料。'; }
  emptyEl.classList.toggle('show', list.length === 0);
  grid.appendChild(emptyEl);
  countEl.textContent = list.length + ' / ' + ITEMS.length + ' 份材料';
}

qEl.oninput = () => { state.q = qEl.value; render(); };
document.getElementById('clear').onclick = () => { state.cat='all'; state.q=''; qEl.value=''; [...navEl.children].forEach((c,i)=>c.classList.toggle('on', i===0)); render(); };
render();
</script>
</body>
</html>
