<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeArts IDE Design</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A1A1A'/%3E%3Ccircle cx='32' cy='32' r='11' fill='%237C5CFC'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDECE8;--card:#FFFFFF;
    --ink:#1A1A18;--ink2:#5C5B56;--ink3:#95948D;
    --line:#E2E0DA;--line2:#ECEAE4;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --sans:"Inter","PingFang SC","HarmonyOS Sans SC","Microsoft YaHei",-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:1320px;margin:0 auto;padding:52px 40px 96px}
  @media(max-width:640px){.wrap{padding:36px 20px 72px}}

  /* ---- hero ---- */
  .hero{margin-bottom:38px}
  .brand{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;font-weight:600;
    letter-spacing:.14em;color:var(--ink3);text-transform:uppercase;margin-bottom:22px}
  .brand .mk{width:9px;height:9px;border-radius:50%;background:#7C5CFC}
  .hero h1{margin:0;font-size:clamp(30px,5.2vw,46px);font-weight:800;letter-spacing:-.03em;line-height:1.05}
  .hero .lead{margin:16px 0 0;color:var(--ink2);font-size:15.5px;max-width:44em}

  /* ---- toolbar: filters + search ---- */
  .toolbar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:space-between;
    margin:34px 0 26px;padding-bottom:20px;border-bottom:1px solid var(--line)}
  .filters{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:999px;
    border:1px solid var(--line);background:var(--card);font-size:13px;font-weight:600;color:var(--ink2);
    transition:.14s ease}
  .chip:hover{border-color:#c9c7c0;color:var(--ink)}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .chip .n{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink3)}
  .chip.on .n{color:rgba(255,255,255,.6)}

  .search{position:relative;flex:0 0 auto;min-width:220px}
  .search input{width:100%;padding:9px 14px 9px 36px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);font-family:var(--sans);font-size:13.5px;outline:none;transition:.14s}
  .search input:focus{border-color:#7C5CFC;box-shadow:0 0 0 3px rgba(124,92,252,.12)}
  .search input::placeholder{color:var(--ink3)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;
    stroke:var(--ink3);fill:none;stroke-width:2}

  /* ---- grid ---- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px 26px}
  @media(max-width:940px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}

  .card{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);
    border-radius:16px;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
    box-shadow:0 1px 2px rgba(26,26,24,.03)}
  .card:hover{transform:translateY(-4px);border-color:#d4d2ca;box-shadow:0 14px 34px -14px rgba(26,26,24,.24)}
  .shot{position:relative;aspect-ratio:16/10;overflow:hidden;background:var(--line2);border-bottom:1px solid var(--line)}
  .shot img{width:100%;height:100%;object-fit:cover;object-position:center top;transition:transform .35s ease}
  .card:hover .shot img{transform:scale(1.025)}
  .cat-lab{position:absolute;top:12px;left:12px;display:inline-flex;align-items:center;gap:6px;
    font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.02em;
    background:rgba(255,255,255,.92);backdrop-filter:blur(4px);color:var(--ink);
    border:1px solid var(--line);border-radius:999px;padding:4px 10px 4px 8px}
  .cat-lab .d{width:7px;height:7px;border-radius:50%;background:var(--ac)}

  .body{padding:18px 18px 20px;display:flex;flex-direction:column;flex:1}
  .card h2{margin:0;font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.4}
  .card .desc{margin:9px 0 0;color:var(--ink2);font-size:13px;line-height:1.6;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .tag{font-family:var(--mono);font-size:10.5px;font-weight:500;color:var(--ink2);
    background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:3px 8px}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;
    border-top:1px solid var(--line2)}
  .foot .st{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
    font-weight:600;color:var(--ink2)}
  .foot .st::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ac)}
  .foot .go{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink3);transition:.14s}
  .card:hover .foot .go{color:#7C5CFC}

  .empty{display:none;text-align:center;padding:72px 20px;color:var(--ink3);grid-column:1/-1;
    border:1px dashed var(--line);border-radius:16px;background:rgba(255,255,255,.4)}
  .empty.show{display:block}
  .empty h3{margin:0 0 6px;color:var(--ink2);font-size:15px;font-family:var(--mono);letter-spacing:.04em}
  .clear{margin-top:16px;padding:8px 16px;border:1px solid var(--line);border-radius:999px;background:var(--card);
    font-size:12.5px;font-weight:600}

  footer{margin-top:64px;padding-top:22px;border-top:1px solid var(--line);color:var(--ink3);
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="brand"><span class="mk"></span>CodeArts IDE Design</div>
    <h1>CodeArts IDE DESIGN</h1>
    <p class="lead">CodeArts IDE / 码道代码智能体的体验设计材料集——专项分析、业界洞察与竞品、交互原型与组件规范,持续更新。</p>
  </header>

  <div class="toolbar">
    <div class="filters" id="filters"></div>
    <div class="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="搜索材料 / 关键词…" autocomplete="off">
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">
    <h3 id="emptyTitle">NO MATCH</h3>
    <div id="emptyDesc">换个关键词,或查看全部材料。</div>
    <button class="clear" id="clear">查看全部</button>
  </div>

  <footer>
    <span>© 2026 CodeArts IDE Design · 内容仅用于设计交流</span>
    <span id="count"></span>
  </footer>
</div>

<script>
const STATUS = { live:"可体验", proto:"交互原型", concept:"概念探索", doc:"文档" };

// ★ 分类:未来加类型 → 在这里加一行(id 唯一,label 显示名,ac 为强调色)
const CATEGORIES = [
  { id:"all",  label:"全部",            ac:"#1A1A18" },
  { id:"专项", label:"专项分析",         ac:"#7C5CFC" },
  { id:"洞察", label:"业界洞察+竞品分析", ac:"#E0872E" },
  { id:"原型", label:"交互原型",         ac:"#17A398" },
  { id:"组件", label:"组件·规范",         ac:"#3B6FE0" }
];
const catOf = id => CATEGORIES.find(c => c.id === id) || {};

// ★ 添加新材料:复制一个对象,cat 填上面的分类 id,填 标题/desc/preview/tags/href
const ITEMS = [
  {
    title: "码道 · 生成响应体验优化专项",
    cat: "专项",
    status: "live",
    desc: "把“感觉慢”拆成可证明的证据链:五产品同题实测、输出结构拆解、根因机制与设计方案——五阶段主干 + 异常旁路 + 状态动效原则。",
    preview: "assets/preview-madao-response-deck.png",
    tags: ["评测", "响应体验", "40 页"],
    href: "madao-response-deck/"
  },
  {
    title: "CodeArts ADE · 拆透 ADE,重构工作流",
    cat: "洞察",
    status: "concept",
    desc: "从产品拆解到设计主张:AI 时代开发工作流里什么该变、什么该留——把“验收”做成新流程的心脏。含 ADE 速写、竞品横比与落地路线。",
    preview: "assets/preview-codearts-ade-vision.png",
    tags: ["ADE 拆解", "设计主张", "验收中心"],
    href: "codearts-ade-vision/"
  },
  {
    title: "当 IDE 遇见 Agent,用户体验如何重新定义",
    cat: "洞察",
    status: "doc",
    desc: "以 Jesse James Garrett 用户体验五要素为框架,系统拆解 Claude、Cursor 3、Codex、TRAE SOLO、WorkBuddy 五款产品的设计决策与竞争差异。",
    preview: "assets/preview-agentspace-insight.png",
    tags: ["UX 五要素", "5 款横比", "行业分析"],
    href: "agentspace-insight/"
  },
  {
    title: "Agent Team 模式的 UX 解剖",
    cat: "洞察",
    status: "doc",
    desc: "当“一个 Agent 打天下”变成“一支 Agent 协同作战”——用 UX 五要素框架,解构 Claude Code、Qoder 专家团、Kimi Agent Swarm 三种设计哲学。",
    preview: "assets/preview-agent-team-analysis.png",
    tags: ["Agent Team", "3 款横比", "多智能体"],
    href: "agent-team-analysis/"
  },
  {
    title: "Agent Space · 交互原型",
    cat: "原型",
    status: "proto",
    desc: "IDE 内的 Agent Team 高保真交互原型:从需求下达到多 Agent 并行/串行编排、任务监控、交付件生成与代码生成的完整链路。",
    preview: "assets/preview-agent-space-prototype.png",
    tags: ["高保真", "Agent 编排", "任务监控"],
    href: "agent-space-prototype/"
  },
  {
    title: "Agent 对话式交互指南 · 组件库",
    cat: "组件",
    status: "doc",
    desc: "过程要透明,但不能淹没结果。把 chat / code 全过程拆成 4 层结构、28 张可复用组件、6 状态机,沉淀为一套可落地的对话流规范。",
    preview: "assets/preview-ai-dialogflow-components.png",
    tags: ["组件库", "28 组件", "对话流规范"],
    href: "ai-dialogflow-components/"
  }
];

const filtersEl = document.getElementById('filters');
const grid = document.getElementById('grid');
const qEl = document.getElementById('q');
const emptyEl = document.getElementById('empty');
const emptyTitle = document.getElementById('emptyTitle');
const emptyDesc = document.getElementById('emptyDesc');
const countEl = document.getElementById('count');
const state = { cat:'all', q:'' };

// build filter chips
CATEGORIES.forEach(c => {
  const n = c.id === 'all' ? ITEMS.length : ITEMS.filter(i => i.cat === c.id).length;
  const b = document.createElement('button');
  b.className = 'chip' + (c.id === 'all' ? ' on' : '');
  b.innerHTML = `<span>${c.label}</span><span class="n">${String(n).padStart(2,'0')}</span>`;
  b.onclick = () => { state.cat = c.id; [...filtersEl.children].forEach(x => x.classList.toggle('on', x === b)); render(); };
  filtersEl.appendChild(b);
});

function match(it){
  if (state.cat !== 'all' && it.cat !== state.cat) return false;
  const q = state.q.trim().toLowerCase();
  if (!q) return true;
  return (it.title+' '+it.desc+' '+(it.tags||[]).join(' ')+' '+(catOf(it.cat).label||'')).toLowerCase().includes(q);
}

function render(){
  const list = ITEMS.filter(match);
  grid.innerHTML = list.map(it => {
    const c = catOf(it.cat);
    const st = STATUS[it.status] || it.status;
    const tags = (it.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const thumb = it.preview ? `<img src="${it.preview}" alt="${it.title}" loading="lazy">` : '';
    return `<a class="card" href="${it.href}" style="--ac:${c.ac}">
      <div class="shot"><span class="cat-lab"><span class="d"></span>${c.label}</span>${thumb}</div>
      <div class="body">
        <h2>${it.title}</h2>
        <p class="desc">${it.desc}</p>
        <div class="tags">${tags}</div>
        <div class="foot"><span class="st">${st}</span><span class="go">OPEN ↗</span></div>
      </div>
    </a>`;
  }).join('');
  const zeroCat = state.cat !== 'all' && ITEMS.filter(i => i.cat === state.cat).length === 0;
  if (zeroCat){ emptyTitle.textContent = 'COMING SOON'; emptyDesc.textContent = '「' + (catOf(state.cat).label) + '」分类的材料即将上线。'; }
  else { emptyTitle.textContent = 'NO MATCH'; emptyDesc.textContent = '换个关键词,或查看全部材料。'; }
  emptyEl.classList.toggle('show', list.length === 0);
  grid.appendChild(emptyEl);
  countEl.textContent = list.length + ' / ' + ITEMS.length + ' 份材料';
}

qEl.oninput = () => { state.q = qEl.value; render(); };
document.getElementById('clear').onclick = () => { state.cat='all'; state.q=''; qEl.value=''; [...filtersEl.children].forEach((c,i)=>c.classList.toggle('on', i===0)); render(); };
render();
</script>
</body>
</html>
