<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeArts IDE Design</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A1C1E'/%3E%3Ccircle cx='32' cy='32' r='11' fill='%237C5CFC'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script>
  // apply theme before paint to avoid flash
  (function(){try{var t=localStorage.getItem('ide-theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
</script>
<style>
  :root{
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --sans:"Inter","PingFang SC","HarmonyOS Sans SC","Microsoft YaHei",-apple-system,sans-serif;
    --accent:#7C5CFC;
  }
  /* cool-gray light theme */
  :root[data-theme="light"]{
    --bg:#E7E9EC;--card:#FFFFFF;--panel:#F1F2F4;
    --ink:#1A1C1F;--ink2:#565B61;--ink3:#8A8F96;
    --line:#DBDEE2;--line2:#E7E9EC;
    --glow1:rgba(124,92,252,.10);--glow2:rgba(23,163,152,.09);
    --shadow:0 16px 36px -16px rgba(26,28,31,.24);
  }
  /* cool-gray dark theme */
  :root[data-theme="dark"]{
    --bg:#111318;--card:#1A1D23;--panel:#22262D;
    --ink:#ECEEF1;--ink2:#A4A9B2;--ink3:#6E747D;
    --line:#2A2F37;--line2:#20242B;
    --glow1:rgba(124,92,252,.18);--glow2:rgba(23,163,152,.14);
    --shadow:0 20px 44px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;position:relative;
    transition:background .35s ease,color .35s ease}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(680px 480px at 82% -6%,var(--glow1),transparent 62%),
      radial-gradient(620px 520px at -8% 108%,var(--glow2),transparent 60%);}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:1360px;margin:0 auto;padding:44px 40px 96px}
  @media(max-width:640px){.wrap{padding:28px 20px 72px}}

  /* ---- topbar ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
  .brand{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;font-weight:600;
    letter-spacing:.14em;color:var(--ink3);text-transform:uppercase}
  .brand .mk{width:20px;height:20px;border-radius:6px;
    background:linear-gradient(135deg,var(--accent),#38C9D7);box-shadow:0 4px 14px -4px var(--accent)}
  .theme-toggle{display:inline-flex;align-items:center;gap:8px;padding:7px 13px 7px 10px;border-radius:999px;
    border:1px solid var(--line);background:var(--card);font-size:12px;font-weight:600;color:var(--ink2);
    transition:.16s ease}
  .theme-toggle:hover{border-color:var(--accent);color:var(--ink)}
  .theme-toggle svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .theme-toggle .ti-sun{display:none}.theme-toggle .ti-moon{display:block}
  :root[data-theme="dark"] .theme-toggle .ti-sun{display:block}
  :root[data-theme="dark"] .theme-toggle .ti-moon{display:none}
  .theme-toggle .tl-l{display:none}.theme-toggle .tl-d{display:inline}
  :root[data-theme="dark"] .theme-toggle .tl-l{display:inline}
  :root[data-theme="dark"] .theme-toggle .tl-d{display:none}

  /* ---- hero ---- */
  .hero{margin-bottom:6px}
  .hero .eyebrow{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.18em;
    text-transform:uppercase;color:var(--accent);margin-bottom:14px}
  .hero h1{margin:0;font-size:clamp(32px,5.4vw,50px);font-weight:900;letter-spacing:-.035em;line-height:1.02}
  .hero h1 .g{background:linear-gradient(100deg,var(--accent) 10%,#38C9D7 90%);-webkit-background-clip:text;
    background-clip:text;color:transparent}
  .hero .lead{margin:16px 0 0;color:var(--ink2);font-size:15px;max-width:47em}

  /* ---- two-column: sidebar + main ---- */
  .layout{display:grid;grid-template-columns:212px 1fr;gap:36px;align-items:start;margin-top:34px}
  @media(max-width:820px){.layout{grid-template-columns:1fr;gap:22px}}

  .side{position:sticky;top:26px}
  @media(max-width:820px){.side{position:static}}
  .side .cap{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ink3);padding:0 4px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
  .navlist{display:flex;flex-direction:column;gap:2px}
  .navitem{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    padding:9px 12px;border:0;border-radius:9px;background:transparent;text-align:left;
    font-size:13.5px;font-weight:600;color:var(--ink2);transition:.14s ease}
  .navitem:hover{background:var(--panel);color:var(--ink)}
  .navitem.on{background:var(--ink);color:var(--bg)}
  .navitem .lab{display:inline-flex;align-items:center;gap:8px}
  .navitem .dot{width:8px;height:8px;border-radius:50%;background:var(--ac);flex:none;
    box-shadow:0 0 0 3px color-mix(in srgb,var(--ac) 18%,transparent)}
  .navitem.on .dot{box-shadow:0 0 0 3px color-mix(in srgb,var(--ac) 45%,transparent)}
  .navitem .n{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink3);flex:none}
  .navitem.on .n{color:color-mix(in srgb,var(--bg) 70%,transparent)}
  .side .hint{font-family:var(--mono);font-size:10.5px;line-height:1.7;color:var(--ink3);padding:16px 4px 0}

  /* ---- main: search + grid ---- */
  .search{position:relative;margin-bottom:24px;max-width:340px}
  .search input{width:100%;padding:10px 14px 10px 38px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);font-family:var(--sans);font-size:13.5px;outline:none;transition:.14s}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 16%,transparent)}
  .search input::placeholder{color:var(--ink3)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:15px;height:15px;
    stroke:var(--ink3);fill:none;stroke-width:2}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:26px 24px}

  .card{position:relative;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);
    border-radius:16px;overflow:hidden;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
    box-shadow:0 1px 2px rgba(0,0,0,.04);opacity:0;transform:translateY(14px);
    animation:cardin .5s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes cardin{to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.card{animation:none;opacity:1;transform:none}}
  .card::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;
    background:linear-gradient(90deg,var(--ac),color-mix(in srgb,var(--ac) 30%,transparent));
    opacity:0;transition:opacity .2s ease;z-index:3}
  .card:hover{transform:translateY(-5px);border-color:color-mix(in srgb,var(--ac) 55%,var(--line));
    box-shadow:var(--shadow),0 0 0 1px color-mix(in srgb,var(--ac) 22%,transparent)}
  .card:hover::before{opacity:1}
  .shot{position:relative;aspect-ratio:16/10;overflow:hidden;background:var(--panel);border-bottom:1px solid var(--line)}
  .shot img{width:100%;height:100%;object-fit:cover;object-position:center top;transition:transform .4s ease}
  .card:hover .shot img{transform:scale(1.035)}
  .cat-lab{position:absolute;top:12px;left:12px;display:inline-flex;align-items:center;gap:6px;
    font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.02em;
    background:color-mix(in srgb,var(--ac) 16%,#fff);color:color-mix(in srgb,var(--ac) 72%,#111);
    border:1px solid color-mix(in srgb,var(--ac) 38%,transparent);border-radius:999px;padding:4px 10px 4px 8px;
    backdrop-filter:blur(4px);box-shadow:0 4px 12px -6px rgba(0,0,0,.3)}
  .cat-lab .d{width:7px;height:7px;border-radius:50%;background:var(--ac)}
  .num{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:10.5px;font-weight:700;
    color:#fff;background:rgba(12,14,20,.5);border:1px solid rgba(255,255,255,.22);border-radius:7px;
    padding:3px 7px;backdrop-filter:blur(4px)}

  .body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
  .kicker{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.04em;
    color:color-mix(in srgb,var(--ac) 68%,var(--ink3));margin-bottom:7px}
  .card h2{margin:0;font-size:16.5px;font-weight:800;letter-spacing:-.015em;line-height:1.38}
  .card .desc{margin:8px 0 0;color:var(--ink2);font-size:12.5px;line-height:1.62;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px}
  .tag{font-family:var(--mono);font-size:10.5px;font-weight:500;color:var(--ink2);
    background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:3px 8px;transition:.16s}
  .card:hover .tag{border-color:color-mix(in srgb,var(--ac) 30%,var(--line))}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:14px;
    border-top:1px solid var(--line2)}
  .foot .st{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
    font-weight:600;color:var(--ink2)}
  .foot .st::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ac);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--ac) 20%,transparent)}
  .foot .go{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink3);transition:.16s;
    display:inline-flex;align-items:center;gap:4px}
  .card:hover .foot .go{color:color-mix(in srgb,var(--ac) 72%,var(--ink))}
  .card:hover .foot .go .arw{transform:translate(2px,-2px)}
  .foot .go .arw{transition:transform .16s ease}

  .empty{display:none;text-align:center;padding:72px 20px;color:var(--ink3);grid-column:1/-1;
    border:1px dashed var(--line);border-radius:16px;background:color-mix(in srgb,var(--card) 55%,transparent)}
  .empty.show{display:block}
  .empty h3{margin:0 0 6px;color:var(--ink2);font-size:15px;font-family:var(--mono);letter-spacing:.04em}
  .clear{margin-top:16px;padding:8px 16px;border:1px solid var(--line);border-radius:999px;background:var(--card);
    font-size:12.5px;font-weight:600}

  footer{margin-top:60px;padding-top:22px;border-top:1px solid var(--line);color:var(--ink3);
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="mk"></span>CodeArts IDE Design</div>
    <button class="theme-toggle" id="themeBtn" aria-label="切换深浅模式">
      <svg class="ti-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      <svg class="ti-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <span class="tl-d">深色</span><span class="tl-l">浅色</span>
    </button>
  </div>

  <header class="hero">
    <span class="eyebrow">Experience Design · Material Library</span>
    <h1>CodeArts IDE <span class="g">DESIGN</span></h1>
    <p class="lead">CodeArts IDE / 码道代码智能体的体验设计材料集——专项分析、业界洞察与竞品、交互原型与组件规范,一处托管,持续更新。</p>
  </header>

  <div class="layout">
    <aside class="side">
      <div class="cap">目录 · Catalog</div>
      <div class="navlist" id="nav"></div>
      <div class="hint">□ 分类持续扩展<br>□ 点击可筛选</div>
    </aside>

    <main>
      <div class="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="搜索材料 / 关键词…" autocomplete="off">
      </div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty">
        <h3 id="emptyTitle">NO MATCH</h3>
        <div id="emptyDesc">换个关键词,或查看全部材料。</div>
        <button class="clear" id="clear">查看全部</button>
      </div>
    </main>
  </div>

  <footer>
    <span>© 2026 CodeArts IDE Design · 内容仅用于设计交流</span>
    <span id="count"></span>
  </footer>
</div>

<script>
const STATUS = { live:"可体验", proto:"可交互", concept:"概念探索", doc:"可阅读" };

// ★ 分类:未来加类型 → 在这里加一行(id 唯一,label 显示名,ac 为强调色)
const CATEGORIES = [
  { id:"all",  label:"全部",            ac:"#7C5CFC" },
  { id:"专项", label:"专项分析",         ac:"#7C5CFC" },
  { id:"洞察", label:"业界洞察+竞品分析", ac:"#E0872E" },
  { id:"原型", label:"交互原型",         ac:"#17A398" },
  { id:"组件", label:"组件·规范",         ac:"#3B6FE0" }
];
const catOf = id => CATEGORIES.find(c => c.id === id) || {};

// ★ 添加新材料:复制一个对象,cat 填分类 id,填 kicker/标题/desc/preview/tags/href
const ITEMS = [
  {
    title: "码道 · 生成响应体验优化专项",
    kicker: "生成响应体验 · 40 页深挖",
    cat: "专项",
    status: "live",
    desc: "把用户一句“感觉慢”拆成可证明的证据链:五款产品同题实测、码道输出结构拆解、根因机制归因,最终落到五阶段主干 + 异常旁路 + 状态动效的设计方案。",
    preview: "assets/preview-madao-response-deck.png",
    tags: ["五产品实测", "根因拆解", "40 页"],
    href: "madao-response-deck/"
  },
  {
    title: "拆透 ADE,重构 AI 时代的开发工作流",
    kicker: "CodeArts ADE · 设计主张",
    cat: "洞察",
    status: "concept",
    desc: "AI 时代的开发工作流,什么该变、什么该留?从 ADE 逐层拆解到竞品横比,提出把“验收”做成新流程心脏的设计主张,并给出可落地的演进路线。",
    preview: "assets/preview-codearts-ade-vision.png",
    tags: ["ADE 拆解", "设计主张", "验收中心"],
    href: "codearts-ade-vision/"
  },
  {
    title: "当 IDE 遇见 Agent,体验如何被重新定义",
    kicker: "UX 五要素 · 5 款横评",
    cat: "洞察",
    status: "doc",
    desc: "以用户体验五要素为标尺,系统拆解 Claude、Cursor 3、Codex、TRAE SOLO、WorkBuddy 五款产品,从战略层到表现层的设计取舍与竞争差异。",
    preview: "assets/preview-agentspace-insight.png",
    tags: ["UX 五要素", "5 款横评", "行业格局"],
    href: "agentspace-insight/"
  },
  {
    title: "Agent Team 模式的 UX 解剖",
    kicker: "多智能体协同 · 3 款横评",
    cat: "洞察",
    status: "doc",
    desc: "当“一个 Agent 打天下”变成“一支 Agent 协同作战”——用五要素框架,解构 Claude Code、Qoder 专家团、Kimi Agent Swarm 三种截然不同的设计哲学。",
    preview: "assets/preview-agent-team-analysis.png",
    tags: ["Agent Team", "3 款横评", "多智能体"],
    href: "agent-team-analysis/"
  },
  {
    title: "Agent Space · IDE 内的智能体协同",
    kicker: "高保真交互原型",
    cat: "原型",
    status: "proto",
    desc: "IDE 里 Agent Team 的全链路高保真原型:从需求下达,到多 Agent 的并行 / 串行编排、实时任务监控、交付物生成,一路贯通到代码落地。",
    preview: "assets/preview-agent-space-prototype.png",
    tags: ["高保真", "Agent 编排", "任务监控"],
    href: "agent-space-prototype/"
  },
  {
    title: "Agent 对话式交互指南",
    kicker: "对话流组件库 · 4 层 28 组件",
    cat: "组件",
    status: "doc",
    desc: "过程要透明,但别淹没结果。把 chat / code 全过程拆成 4 层结构、28 张可复用组件、6 组状态机,沉淀为一套可直接落地的对话流交互规范。",
    preview: "assets/preview-ai-dialogflow-components.png",
    tags: ["组件库", "28 组件", "状态机"],
    href: "ai-dialogflow-components/"
  }
];

const navEl = document.getElementById('nav');
const grid = document.getElementById('grid');
const qEl = document.getElementById('q');
const emptyEl = document.getElementById('empty');
const emptyTitle = document.getElementById('emptyTitle');
const emptyDesc = document.getElementById('emptyDesc');
const countEl = document.getElementById('count');
const state = { cat:'all', q:'' };

// theme toggle
const themeBtn = document.getElementById('themeBtn');
themeBtn.onclick = () => {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('ide-theme', next); }catch(e){}
};

// build sidebar catalog
CATEGORIES.forEach(c => {
  const n = c.id === 'all' ? ITEMS.length : ITEMS.filter(i => i.cat === c.id).length;
  const b = document.createElement('button');
  b.className = 'navitem' + (c.id === 'all' ? ' on' : '');
  b.style.setProperty('--ac', c.ac);
  b.innerHTML = `<span class="lab">${c.id==='all'?'':'<span class="dot"></span>'}${c.label}</span><span class="n">${String(n).padStart(2,'0')}</span>`;
  b.onclick = () => { state.cat = c.id; [...navEl.children].forEach(x => x.classList.toggle('on', x === b)); render(); };
  navEl.appendChild(b);
});

function match(it){
  if (state.cat !== 'all' && it.cat !== state.cat) return false;
  const q = state.q.trim().toLowerCase();
  if (!q) return true;
  return (it.title+' '+(it.kicker||'')+' '+it.desc+' '+(it.tags||[]).join(' ')+' '+(catOf(it.cat).label||'')).toLowerCase().includes(q);
}

function render(){
  const list = ITEMS.filter(match);
  grid.innerHTML = list.map((it, i) => {
    const c = catOf(it.cat);
    const st = STATUS[it.status] || it.status;
    const no = String(ITEMS.indexOf(it)+1).padStart(2,'0');
    const tags = (it.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const thumb = it.preview ? `<img src="${it.preview}" alt="${it.title}" loading="lazy">` : '';
    return `<a class="card" href="${it.href}" style="--ac:${c.ac};animation-delay:${i*55}ms">
      <div class="shot">
        <span class="cat-lab"><span class="d"></span>${c.label}</span>
        <span class="num">${no}</span>
        ${thumb}
      </div>
      <div class="body">
        ${it.kicker ? `<div class="kicker">${it.kicker}</div>` : ''}
        <h2>${it.title}</h2>
        <p class="desc">${it.desc}</p>
        <div class="tags">${tags}</div>
        <div class="foot"><span class="st">${st}</span><span class="go">查看<span class="arw">↗</span></span></div>
      </div>
    </a>`;
  }).join('');
  const zeroCat = state.cat !== 'all' && ITEMS.filter(i => i.cat === state.cat).length === 0;
  if (zeroCat){ emptyTitle.textContent = 'COMING SOON'; emptyDesc.textContent = '「' + (catOf(state.cat).label) + '」分类的材料即将上线。'; }
  else { emptyTitle.textContent = 'NO MATCH'; emptyDesc.textContent = '换个关键词,或查看全部材料。'; }
  emptyEl.classList.toggle('show', list.length === 0);
  grid.appendChild(emptyEl);
  countEl.textContent = list.length + ' / ' + ITEMS.length + ' 份材料';
}

qEl.oninput = () => { state.q = qEl.value; render(); };
document.getElementById('clear').onclick = () => { state.cat='all'; state.q=''; qEl.value=''; [...navEl.children].forEach((c,i)=>c.classList.toggle('on', i===0)); render(); };
render();
</script>
</body>
</html>
