<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeArts IDE Design · 材料中心</title>
<style>
  :root{--bg:#F3F5F8;--card:#fff;--line:#E2E6EC;--ink:#16191E;--ink2:#5A626E;--ink3:#8B929A;--accent:#5B5BD6;--accent2:#7C3AED}
  @media (prefers-color-scheme:dark){:root{--bg:#0B0C10;--card:#15171C;--line:#262A32;--ink:#ECEEF2;--ink2:#A7ADB8;--ink3:#6E7580}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"HarmonyOS Sans SC","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
  .wrap{max-width:880px;margin:0 auto;padding:64px 24px 80px}
  .brand{font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--ink3)}
  .brand b{color:var(--accent)}
  h1{margin:14px 0 8px;font-size:clamp(26px,4.5vw,38px);font-weight:900;letter-spacing:-.01em}
  h1 span{background:linear-gradient(105deg,var(--ink),var(--accent) 70%,var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .lead{color:var(--ink2);font-size:15px;max-width:38em;margin:0 0 40px}
  .grid{display:grid;gap:16px}
  a.card{display:block;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;text-decoration:none;color:inherit;transition:transform .15s ease,box-shadow .15s ease,border-color .15s}
  a.card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 14px 38px -22px rgba(91,91,214,.4)}
  .tag{display:inline-block;font:700 11px/1 ui-monospace,Menlo,monospace;letter-spacing:.08em;color:var(--accent);background:rgba(91,91,214,.1);border-radius:999px;padding:5px 10px;margin-bottom:10px}
  .card h2{margin:0 0 6px;font-size:19px;font-weight:800}
  .card p{margin:0;color:var(--ink2);font-size:14px}
  .card .meta{margin-top:12px;font:12px ui-monospace,Menlo,monospace;color:var(--ink3);display:flex;gap:14px;flex-wrap:wrap}
  .arrow{float:right;color:var(--ink3);font-size:18px;transition:transform .15s}
  a.card:hover .arrow{transform:translateX(4px);color:var(--accent)}
  footer{margin-top:56px;color:var(--ink3);font-size:12px;font-family:ui-monospace,Menlo,monospace}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">CodeArts <b>IDE DESIGN</b> · UCD</div>
  <h1><span>设计材料中心</span></h1>
  <p class="lead">CodeArts IDE / 码道代码智能体相关的体验设计材料统一托管:汇报 deck、原型、评测证据等,点击卡片进入。</p>
  <div class="grid">
    <a class="card" href="madao-response-deck/">
      <span class="arrow">→</span>
      <span class="tag">汇报 DECK · 40 页</span>
      <h2>码道 · 生成响应体验优化专项</h2>
      <p>把"感觉慢"拆成可证明的证据链:五产品同题实测、码道输出结构拆解、根因机制与设计方案(五阶段主干 + 异常旁路 + 状态动效原则)。</p>
      <div class="meta"><span>2026.07</span><span>滚动 / PageDown 翻页</span><span>点击截图可放大</span></div>
    </a>
    <!-- 新材料模板:复制上面的 <a class="card"> 改 href/标题/描述 即可 -->
  </div>
  <footer>© 2026 UCD CENTER · 内容仅用于设计交流</footer>
</div>
</body>
</html>
